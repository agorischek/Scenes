name: Scenes
options:
  bundleIdPrefix: dev.umeboshi
settings:
  base:
    MACOSX_DEPLOYMENT_TARGET: "14.0"
targets:
  Scenes:
    type: application
    platform: macOS
    sources:
      - path: Sources/Scenes
    resources:
      - path: Resources
      - path: Examples
        buildPhase: resources
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: Scenes
        LSApplicationCategoryType: public.app-category.productivity
        LSMinimumSystemVersion: "14.0"
        LSUIElement: true
        NSAppleEventsUsageDescription: Scenes can send Apple events to Terminal-compatible apps when future scene actions need it.
        NSHumanReadableCopyright: Copyright 2026
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: dev.umeboshi.scene
            UTTypeConformsTo:
              - public.json
            UTTypeDescription: Scenes Scene
            UTTypeTagSpecification:
              public.filename-extension:
                - scene
              public.mime-type:
                - application/vnd.umeboshi.scene+json
        CFBundleDocumentTypes:
          - CFBundleTypeName: Scenes Scene
            LSHandlerRank: Owner
            LSItemContentTypes:
              - dev.umeboshi.scene
            CFBundleTypeRole: Editor
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.umeboshi.Scenes
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "6.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
    scheme:
      testTargets: []
